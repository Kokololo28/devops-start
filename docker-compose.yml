services:
  web:
    build: .
    ports:
      - "8080:5000"
    environment:
      DB_HOST: db
      DB_NAME: db
      DB_USER: welland
      DB_PASS: 1298
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: welland
      POSTGRES_PASSWORD: 1298
      POSTGRES_DB: db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: